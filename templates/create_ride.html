{% extends 'base.html' %}

{% block content %}

<h2>Create Ride</h2>

<form method="POST">
    <input type="text" name="title" placeholder="Ride Title" required>
    <br><br>
    <input type="text" name="location" placeholder="Location" required>
    <br><br>
    <input type="ride_date" name="ride_date" placeholder="Date (e.g. 01 February 2026)" required>
    <br><br>
    <textarea name="description" placeholder="Ride Description"></textarea>
    <button type="submit">Create Ride</button>
</form>

{% endblock %}
