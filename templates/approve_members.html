{% extends "base.html" %}

{% block content %}

<h2>Pending Member Approvals</h2>

{% if users %}
    <ul>
    {% for user in users %}
        <li>
            {{ user.username}} - {{ user.chapter }}
            <a href="{{ url_for('approve_user', user_id=user.id) }}">Approve</a>
        </li>
    {% endfor %}
    </ul>
{% else %}
    <p>No pending members.</p>
{% endif %}

{% endblock %}
